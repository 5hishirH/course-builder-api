<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Course Builder Server</title>
    <link rel="icon" type="image/png" href="favicon.png" />
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #111827;
      color: #f9fafb;
      font-family:
        -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
        sans-serif;
    "
  >
    <main
      style="
        max-width: 600px;
        width: 90%;
        padding: 2rem;
        background-color: #1f2937;
        border-radius: 1rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        text-align: center;
      "
    >
      <h1
        style="
          font-size: 2.5rem;
          font-weight: 700;
          margin-bottom: 1rem;
          color: #ffffff;
        "
      >
        Welcome to Course Builder Server
      </h1>
      <p
        style="
          font-size: 1.125rem;
          line-height: 1.75rem;
          margin-bottom: 2rem;
          color: #d1d5db;
        "
      >
        The server is running smoothly, delivering a seamless experience for all
        your needs.
      </p>
    </main>
    <footer style="margin-top: 2rem; font-size: 0.875rem; color: #9ca3af">
      All rights are reserved
    </footer>
  </body>
</html>
